<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-title" content="NXA Talent">
    <title>NXA Talent</title>
    <script>
        // Purge legacy service workers to prevent localhost port-3000 cache conflicts
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for (let registration of registrations) {
                    registration.unregister().then(function(success) {
                        if (success) {
                            console.log('Legacy Service Worker purged.');
                            window.location.reload();
                        }
                    });
                }
            });
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>
    <div id="loading-mask" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.6s ease;">
        <div style="text-align: center;">
            <div style="font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 1rem;">
                <span style="color: #0B2E59;">NXA</span><span style="color: #F7931E; font-weight: 300; letter-spacing: 5px; margin-left: 5px;">TALENT</span>
            </div>
            <div style="width: 150px; height: 1px; background: rgba(11, 46, 89, 0.1); margin: 0 auto; position: relative; overflow: hidden;">
                <div style="position: absolute; width: 30%; height: 100%; background: #F7931E; animation: bootFlow 1.5s infinite linear;"></div>
            </div>
            <p style="color: #64748b; font-size: 0.5rem; letter-spacing: 3px; margin-top: 1rem; font-family: sans-serif;">INIT_INDUSTRIAL_CORE</p>
        </div>
    </div>
    <style>
        @keyframes bootFlow {
            from { transform: translateX(-100%); }
            to { transform: translateX(330%); }
        }
    </style>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
